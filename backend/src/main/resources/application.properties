server.port=${PORT:15150}

spring.datasource.url=jdbc:h2:file:./data/linkedin-content-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

ai.python.base-url=${AI_PYTHON_BASE_URL:https://linkedin-generator-api.onrender.com}
ai.python.generate-path=${AI_PYTHON_GENERATE_PATH:/api/ai/generate-linkedin-post}

frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
